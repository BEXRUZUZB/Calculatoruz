<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Calculator</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#111;
  font-family:Arial;
  color:white;
}

/* calculator */
.calc{
  width:260px;
  background:#222;
  padding:15px;
  border-radius:10px;
  position:relative;
}

input{
  width:100%;
  height:40px;
  margin-bottom:10px;
  text-align:right;
  font-size:18px;
}

button{
  width:60px;
  height:50px;
  margin:4px;
  font-size:18px;
  cursor:pointer;
}

.equal{background:orange;color:white;width:130px;}
.clear{background:red;color:white;width:130px;}

/* ⚙ fixed outside */
.settings{
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:#555;
  color:white;
  border:none;
  padding:10px 12px;
  border-radius:50%;
  cursor:pointer;
}

/* popup */
.popup{
  display:none;
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000ee;
  border-radius:10px;
  padding:10px;
}

.popup input{
  width:90%;
  margin:5px 0;
  text-align:left;
}

.close{
  background:red;
  color:white;
  border:none;
  margin-top:10px;
}
</style>
</head>
<body>

<!-- ⚙ outside button -->
<button class="settings" onclick="toggle()">⚙</button>

<div class="calc">

  <input type="text" id="display" disabled>

  <div>
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">/</button>
  </div>

  <div>
    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">*</button>
  </div>

  <div>
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">*</button>
  </div>

  <div>
    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="press('+')">+</button>
  </div>

  <div>
    <button class="clear" onclick="clearD()">C</button>
    <button class="equal" onclick="calc()">=</button>
  </div>

  <!-- popup -->
  <div class="popup" id="popup">

    <h3>Yosh hisoblash</h3>
    <input id="year" placeholder="Tug'ilgan yil">
    <button onclick="age()">Hisobla</button>
    <h4 id="ageRes"></h4>

    <hr>

    <h3>Yil tekshirish</h3>
    <input id="checkYear" placeholder="Yil">
    <button onclick="check()">Tekshir</button>
    <h4 id="yearRes"></h4>

    <button class="close" onclick="toggle()">Yopish</button>
  </div>

</div>

<script>

let display=document.getElementById("display");

function press(v){
  display.value+=v;
}

function clearD(){
  display.value="";
}

function calc(){
  try{
    display.value=eval(display.value);
  }catch{
    display.value="Xato";
  }
}

// popup
function toggle(){
  let p=document.getElementById("popup");
  p.style.display = (p.style.display=="block") ? "none" : "block";
}

// age
function age(){
  let y=document.getElementById("year").value;
  let now=new Date().getFullYear();
  document.getElementById("ageRes").innerText=now-y;
}

// year
function check(){
  let y=document.getElementById("checkYear").value;
  let now=new Date().getFullYear();

  if(y<now) document.getElementById("yearRes").innerText="O'tgan yil";
  else if(y==now) document.getElementById("yearRes").innerText="Hozirgi yil";
  else document.getElementById("yearRes").innerText="Kelajak yil";
}

</script>

</body>
</html>
