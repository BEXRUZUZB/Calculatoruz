<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Calculator + Yosh</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#111;
  color:white;
}

.box{
  margin-top:30px;
  padding:20px;
}

button{
  padding:10px 15px;
  margin:5px;
  cursor:pointer;
}

input{
  padding:10px;
  margin:5px;
}
</style>
</head>
<body>

<h2>Mini App</h2>

<!-- MENU -->
<button onclick="showCalc()">Calculator</button>
<button onclick="showAge()">Yosh / Yil</button>

<hr>

<!-- CALCULATOR -->
<div id="calc" class="box">
  <h3>Calculator</h3>
  <input id="a" type="number" placeholder="1-son">
  <input id="b" type="number" placeholder="2-son"><br>

  <button onclick="add()">+</button>
  <button onclick="sub()">-</button>
  <button onclick="mul()">*</button>
  <button onclick="div()">/</button>

  <h3>Natija: <span id="res"></span></h3>
</div>

<!-- AGE -->
<div id="age" class="box" style="display:none;">
  <h3>Yosh hisoblash</h3>

  <input id="year" type="number" placeholder="Tug'ilgan yil">

  <button onclick="calcAge()">Hisobla</button>

  <h3>Yosh: <span id="ageRes"></span></h3>
</div>

<script>

// MENU
function showCalc(){
  document.getElementById("calc").style.display="block";
  document.getElementById("age").style.display="none";
}

function showAge(){
  document.getElementById("calc").style.display="none";
  document.getElementById("age").style.display="block";
}

// CALC
function add(){
  let a=Number(a=document.getElementById("a").value);
  let b=Number(document.getElementById("b").value);
  document.getElementById("res").innerText=a+b;
}

function sub(){
  let a=Number(document.getElementById("a").value);
  let b=Number(document.getElementById("b").value);
  document.getElementById("res").innerText=a-b;
}

function mul(){
  let a=Number(document.getElementById("a").value);
  let b=Number(document.getElementById("b").value);
  document.getElementById("res").innerText=a*b;
}

function div(){
  let a=Number(document.getElementById("a").value);
  let b=Number(document.getElementById("b").value);
  document.getElementById("res").innerText=a/b;
}

// AGE CALC
function calcAge(){
  let y = Number(document.getElementById("year").value);
  let now = new Date().getFullYear();
  document.getElementById("ageRes").innerText = now - y;
}

</script>

</body>
</html>
