<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Mini Tools</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.box{
  background:#222;
  margin:15px auto;
  padding:15px;
  width:300px;
  border-radius:10px;
}

input{
  padding:8px;
  margin:5px;
  width:80%;
}

button{
  padding:8px 12px;
  margin:3px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>Mini Tools</h2>

<!-- CALCULATOR -->
<div class="box">
  <h3>Calculator</h3>

  <input id="a" type="number" placeholder="1-son">
  <input id="b" type="number" placeholder="2-son"><br>

  <button onclick="calc('+')">+</button>
  <button onclick="calc('-')">-</button>
  <button onclick="calc('*')">*</button>
  <button onclick="calc('/')">/</button>

  <h3 id="res"></h3>
</div>

<!-- AGE -->
<div class="box">
  <h3>Yosh hisoblash</h3>

  <input id="year" type="number" placeholder="Tug'ilgan yil">
  <button onclick="age()">Hisobla</button>

  <h3 id="ageRes"></h3>
</div>

<!-- YEAR -->
<div class="box">
  <h3>Yil tekshirish</h3>

  <input id="checkYear" type="number" placeholder="Yil yoz">
  <button onclick="yearCheck()">Tekshir</button>

  <h3 id="yearRes"></h3>
</div>

<script>

// CALC
function calc(op){
  let a=Number(document.getElementById("a").value);
  let b=Number(document.getElementById("b").value);

  if(op=='+') res=a+b;
  if(op=='-') res=a-b;
  if(op=='*') res=a*b;
  if(op=='/') res=a/b;

  document.getElementById("res").innerText=res;
}

// AGE
function age(){
  let y=Number(document.getElementById("year").value);
  let now=new Date().getFullYear();
  document.getElementById("ageRes").innerText="Yosh: "+(now-y);
}

// YEAR CHECK
function yearCheck(){
  let y=Number(document.getElementById("checkYear").value);
  let now=new Date().getFullYear();

  if(y==now){
    document.getElementById("yearRes").innerText="Bu yil";
  }
  else if(y<now){
    document.getElementById("yearRes").innerText="O‘tgan yil";
  }
  else{
    document.getElementById("yearRes").innerText="Kelajak yil";
  }
}

</script>

</body>
</html>
